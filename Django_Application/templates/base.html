<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">

    <title>DeepGuard – Deepfake Detector</title>

                    <a href="{% url 'ml_app:home' %}" class="navbar-brand">

                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>

                        <span class="navbar-text">DeepGuard</span>
                    </a>
                </div>
                
                <div class="navbar-center">
                    <a href="{% url 'ml_app:home' %}" class="nav-link{% if request.resolver_match.url_name == 'home' %} active{% endif %}">
                        Home
                    </a>
                    <a href="{% url 'ml_app:home' %}" class="nav-link{% if request.resolver_match.url_name == 'home' %} active{% endif %}">
                        Upload
                    </a>

                        Analyze Screen
                    </a>
                    <a href="{% url 'ml_app:live' %}" class="nav-link{% if request.resolver_match.url_name == 'live' %} active{% endif %}">
                        Live Camera
                    </a>
                    <a href="{% url 'ml_app:history' %}" class="nav-link{% if request.resolver_match.url_name == 'history' %} active{% endif %}">
                        History
                    </a>
                </div>
                
                <div class="navbar-right">
                    <a href="https://github.com/abhijitjadhav1998/Deepfake_detection_using_deep_learning"
                       target="_blank"
                       class="navbar-link">

                        </svg>
                    </a>
                    <a href="{% url 'ml_app:home' %}" class="btn-try-now">
                        Try Now
                    </a>
                </div>
            </div>
        </nav>

        <main class="app-main">
            {% block content %}
            {% endblock %}
        </main>

        {% include 'footer.html' %}
    </div>

    {% block js_scripts %}
    {% endblock %}
</body>
</html>
